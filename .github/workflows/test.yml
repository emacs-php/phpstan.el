name: CI

on:
  push:
    paths-ignore:
    - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version:
          - 28.2
          - 29.4
          - 30.1
        experimental: [false]
        include:
        - os: ubuntu-latest
          emacs-version: snapshot
          experimental: true
        - os: macos-latest
          emacs-version: snapshot
          experimental: true
        - os: windows-latest
          emacs-version: snapshot
          experimental: true
        exclude:
          # Run the older versions on Ubuntu only, to keep the feedback loop
          # short.  macOS and Windows still cover the latest stable release
          # and the snapshot.
          - os: macos-latest
            emacs-version: "28.2"
          - os: macos-latest
            emacs-version: "29.4"
          - os: windows-latest
            emacs-version: "28.2"
          - os: windows-latest
            emacs-version: "29.4"

    steps:
    - uses: actions/setup-python@v2
      with:
        python-version: '3.x'
        architecture: 'x64'

    - uses: jcs090218/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}

    - uses: emacs-eask/setup-eask@master
      with:
        version: 'snapshot'

    - uses: actions/checkout@v4

    - name: Run make
      run: 'make all'
